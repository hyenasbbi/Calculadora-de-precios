<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculadora IMPORTB2B</title>
  <style>
    body{font-family:Arial,sans-serif;background:#111214;color:#fff;margin:0;padding:20px}
    h1{text-align:center}
    .panel{background:#1a1b1e;padding:15px;border-radius:12px;margin-bottom:20px}
    label{display:block;margin-top:10px;color:#ccc}
    input{width:100%;padding:10px;margin-top:5px;border-radius:8px;border:none;box-sizing:border-box}
    button{width:100%;padding:12px;margin-top:15px;border:none;border-radius:8px;background:#00c853;color:white;font-weight:bold;cursor:pointer}
    .delete{background:#d32f2f;padding:8px;font-size:13px}
    table{width:100%;border-collapse:collapse;background:#1a1b1e;border-radius:12px;overflow:hidden}
    th,td{padding:10px;border-bottom:1px solid #333;text-align:center;font-size:14px}
    th{background:#25262a}
    .summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}
    .card{background:#25262a;padding:15px;border-radius:10px;text-align:center}
    .card strong{display:block;font-size:20px;margin-top:5px}
  </style>
</head>
<body>

<h1>Calculadora de Costos IMPORTB2B</h1>

<div class="panel">
  <label>Precio del dólar del día</label>
  <input type="number" id="dolar" value="1480" oninput="calcularTodo()">

  <label>Margen de ganancia general (%)</label>
  <input type="number" id="margen" value="70" oninput="calcularTodo()">
</div>

<div class="panel">
  <h2>Cargar nuevo producto</h2>

  <label>Prenda</label>
  <input type="text" id="prenda" placeholder="Ej: Argentina manga larga">

  <label>Jugador / Detalle</label>
  <input type="text" id="detalle" placeholder="Ej: Messi">

  <label>Costo real en dólares</label>
  <input type="number" id="costoUsd" placeholder="Ej: 17.31" step="0.01">

  <label>Cantidad</label>
  <input type="number" id="cantidad" value="1">

  <button onclick="agregarProducto()">Agregar producto</button>
</div>

<div class="panel summary">
  <div class="card">Stock total<strong id="stockTotal">0</strong></div>
  <div class="card">Inversión USD<strong id="totalUsd">USD 0</strong></div>
  <div class="card">Inversión ARS<strong id="totalArs">$0</strong></div>
  <div class="card">Venta estimada<strong id="ventaTotal">$0</strong></div>
  <div class="card">Ganancia estimada<strong id="gananciaTotal">$0</strong></div>
</div>

<div class="panel">
  <h2>Listado de productos</h2>

  <table>
    <thead>
      <tr>
        <th>Prenda</th>
        <th>Detalle</th>
        <th>Cant.</th>
        <th>USD</th>
        <th>Costo ARS</th>
        <th>Venta sugerida</th>
        <th>Ganancia</th>
        <th>Acción</th>
      </tr>
    </thead>
    <tbody id="tablaProductos"></tbody>
  </table>
</div>

<script>
const productosIniciales = [
  {prenda:"Argentina femenina", detalle:"Sin nombre", cantidad:2, costoUsd:14},
  {prenda:"Short Argentina", detalle:"#24", cantidad:1, costoUsd:15},
  {prenda:"Short Argentina", detalle:"#5", cantidad:1, costoUsd:15},
  {prenda:"Short Argentina", detalle:"#10", cantidad:1, costoUsd:15},
  {prenda:"Argentina manga larga retro", detalle:"Messi", cantidad:2, costoUsd:23},
  {prenda:"Argentina manga larga retro", detalle:"Messi", cantidad:1, costoUsd:22},
  {prenda:"Argentina manga larga retro", detalle:"Messi", cantidad:1, costoUsd:22},
  {prenda:"Argentina manga larga celeste/blanca", detalle:"Messi", cantidad:2, costoUsd:22},
  {prenda:"Argentina azul", detalle:"Riquelme", cantidad:1, costoUsd:17},
  {prenda:"Argentina azul", detalle:"Messi", cantidad:1, costoUsd:18},
  {prenda:"Canada Portero", detalle:"Sin nombre", cantidad:1, costoUsd:20},
  {prenda:"Campera Manchester", detalle:"Sin nombre", cantidad:1, costoUsd:35},
  {prenda:"Suplente Argentina manga larga", detalle:"Paredes", cantidad:1, costoUsd:22},
  {prenda:"Suplente Argentina manga larga", detalle:"Sin nombre", cantidad:1, costoUsd:19},
  {prenda:"Suplente Argentina manga larga", detalle:"Messi", cantidad:1, costoUsd:22},
  {prenda:"Suplente Argentina manga larga", detalle:"Sin nombre", cantidad:1, costoUsd:20},
  {prenda:"Argentina celeste/blanca", detalle:"Riquelme", cantidad:1, costoUsd:17},
  {prenda:"Como Naranja", detalle:"Nico Paz", cantidad:1, costoUsd:17},
  {prenda:"Barcelona retro", detalle:"Sin nombre", cantidad:1, costoUsd:19},
  {prenda:"Corinthians negra", detalle:"Sin nombre", cantidad:1, costoUsd:20},
  {prenda:"Argentina suplente", detalle:"Sin nombre", cantidad:1, costoUsd:15},
  {prenda:"Argentina suplente", detalle:"Sin nombre", cantidad:1, costoUsd:16}
];

let productos = JSON.parse(localStorage.getItem("productosImportB2B"));

if (!productos) {
  productos = productosIniciales;
  guardar();
}

function formatoPesos(valor) {
  return "$" + Math.round(valor).toLocaleString("es-AR");
}

function formatoUsd(valor) {
  return "USD " + Number(valor).toFixed(2);
}

function guardar() {
  localStorage.setItem("productosImportB2B", JSON.stringify(productos));
}

function agregarProducto() {
  const prenda = document.getElementById("prenda").value.trim();
  const detalle = document.getElementById("detalle").value.trim();
  const costoUsd = parseFloat(document.getElementById("costoUsd").value);
  const cantidad = parseInt(document.getElementById("cantidad").value);

  if (!prenda || isNaN(costoUsd) || isNaN(cantidad) || cantidad <= 0) {
    alert("Completá prenda, costo en USD y cantidad correctamente.");
    return;
  }

  productos.push({
    prenda,
    detalle: detalle || "Sin nombre",
    cantidad,
    costoUsd
  });

  guardar();

  document.getElementById("prenda").value = "";
  document.getElementById("detalle").value = "";
  document.getElementById("costoUsd").value = "";
  document.getElementById("cantidad").value = "1";

  calcularTodo();
}

function eliminarProducto(index) {
  productos.splice(index, 1);
  guardar();
  calcularTodo();
}

function calcularTodo() {
  const dolar = parseFloat(document.getElementById("dolar").value) || 0;
  const margen = parseFloat(document.getElementById("margen").value) || 0;
  const tabla = document.getElementById("tablaProductos");

  tabla.innerHTML = "";

  let stockTotal = 0;
  let totalUsd = 0;
  let totalArs = 0;
  let ventaTotal = 0;
  let gananciaTotal = 0;

  productos.forEach((producto, index) => {
    const costoArsUnitario = producto.costoUsd * dolar;
    const ventaSugeridaUnitario = costoArsUnitario * (1 + margen / 100);
    const gananciaUnitario = ventaSugeridaUnitario - costoArsUnitario;

    stockTotal += producto.cantidad;
    totalUsd += producto.costoUsd * producto.cantidad;
    totalArs += costoArsUnitario * producto.cantidad;
    ventaTotal += ventaSugeridaUnitario * producto.cantidad;
    gananciaTotal += gananciaUnitario * producto.cantidad;

    tabla.innerHTML += `
      <tr>
        <td>${producto.prenda}</td>
        <td>${producto.detalle}</td>
        <td>${producto.cantidad}</td>
        <td>${formatoUsd(producto.costoUsd)}</td>
        <td>${formatoPesos(costoArsUnitario)}</td>
        <td>${formatoPesos(ventaSugeridaUnitario)}</td>
        <td>${formatoPesos(gananciaUnitario)}</td>
        <td><button class="delete" onclick="eliminarProducto(${index})">Eliminar</button></td>
      </tr>
    `;
  });

  document.getElementById("stockTotal").innerText = stockTotal;
  document.getElementById("totalUsd").innerText = formatoUsd(totalUsd);
  document.getElementById("totalArs").innerText = formatoPesos(totalArs);
  document.getElementById("ventaTotal").innerText = formatoPesos(ventaTotal);
  document.getElementById("gananciaTotal").innerText = formatoPesos(gananciaTotal);
}

calcularTodo();
</script>

</body>
</html>
